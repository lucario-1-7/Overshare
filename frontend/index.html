<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Overshare — Phase 2 proof</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      background: #0b0f17; color: #e6edf3; padding: 24px;
    }
    h1 { font-size: 18px; letter-spacing: 1px; color: #7ee787; margin: 0 0 4px; }
    .sub { color: #8b949e; font-size: 12px; margin-bottom: 20px; }
    .wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; max-width: 1100px; }
    @media (max-width: 800px) { .wrap { grid-template-columns: 1fr; } }
    .panel { background: #11161f; border: 1px solid #21262d; border-radius: 10px; padding: 16px; }
    #drop {
      border: 2px dashed #30363d; border-radius: 10px; padding: 40px 16px; text-align: center;
      cursor: pointer; transition: .15s; color: #8b949e;
    }
    #drop.hot { border-color: #7ee787; color: #7ee787; background: #0e1b12; }
    label { display: block; font-size: 12px; color: #8b949e; margin: 14px 0 4px; }
    input[type=text], textarea {
      width: 100%; background: #0b0f17; color: #e6edf3; border: 1px solid #30363d;
      border-radius: 6px; padding: 8px; font: inherit;
    }
    textarea { min-height: 60px; resize: vertical; }
    button {
      margin-top: 14px; background: #238636; color: #fff; border: 0; border-radius: 6px;
      padding: 10px 18px; font: inherit; cursor: pointer; font-weight: 600;
    }
    button:hover { background: #2ea043; }
    button:disabled { opacity: .5; cursor: default; }
    pre {
      margin: 0; white-space: pre-wrap; word-break: break-word; font-size: 12px;
      max-height: 70vh; overflow: auto;
    }
    .meta { font-size: 11px; color: #8b949e; margin-bottom: 10px; }
    .chip {
      display: inline-block; background: #1f6feb22; border: 1px solid #1f6feb55;
      color: #79c0ff; border-radius: 999px; padding: 2px 10px; font-size: 11px; margin: 2px;
    }
    .ok { color: #7ee787; } .err { color: #ff7b72; }
    img.preview { max-width: 100%; border-radius: 8px; margin-top: 10px; display: none; }
  </style>
</head>
<body>
  <h1>OVERSHARE · PHASE 2 PROOF</h1>
  <div class="sub">drop a photo → YOLO + RetinaFace draw boxes → signals + raw <code>/analyze</code> Report JSON</div>

  <div class="wrap">
    <div class="panel">
      <div id="drop">📷 &nbsp;Drop an image here, or click to choose</div>
      <input id="file" type="file" accept="image/*" hidden />
      <img id="preview" class="preview" alt="preview" />

      <label for="text">Caption / text (optional — Phase 3)</label>
      <textarea id="text" placeholder="e.g. lunch near MG Road with the team"></textarea>

      <label for="username">Username / email (optional — Phase 4)</label>
      <input id="username" type="text" placeholder="e.g. janedoe" />

      <button id="go">Analyze</button>
      <div id="status" class="meta" style="margin-top:10px"></div>
    </div>

    <div class="panel">
      <div id="annotatedWrap" style="display:none">
        <label style="margin-top:0">Annotated image (boxes drawn server-side)</label>
        <img id="annotated" class="preview" style="display:block" alt="annotated" />
      </div>
      <div id="chips"></div>
      <div id="reportMeta" class="meta"></div>
      <pre id="out">// Report JSON appears here</pre>
    </div>
  </div>

  <script>
    const drop = document.getElementById('drop');
    const fileInput = document.getElementById('file');
    const preview = document.getElementById('preview');
    const out = document.getElementById('out');
    const chips = document.getElementById('chips');
    const reportMeta = document.getElementById('reportMeta');
    const statusEl = document.getElementById('status');
    const annotated = document.getElementById('annotated');
    const annotatedWrap = document.getElementById('annotatedWrap');
    let pickedFile = null;

    function setFile(f) {
      pickedFile = f;
      if (f) {
        drop.textContent = '📎 ' + f.name + ' (' + Math.round(f.size / 1024) + ' KB)';
        preview.src = URL.createObjectURL(f);
        preview.style.display = 'block';
      }
    }

    drop.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', e => setFile(e.target.files[0]));
    ['dragenter', 'dragover'].forEach(ev =>
      drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.add('hot'); }));
    ['dragleave', 'drop'].forEach(ev =>
      drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.remove('hot'); }));
    drop.addEventListener('drop', e => { if (e.dataTransfer.files[0]) setFile(e.dataTransfer.files[0]); });

    document.getElementById('go').addEventListener('click', analyze);

    async function analyze() {
      const text = document.getElementById('text').value.trim();
      const username = document.getElementById('username').value.trim();
      if (!pickedFile && !text && !username) {
        statusEl.innerHTML = '<span class="err">Pick an image or enter text first.</span>';
        return;
      }
      statusEl.textContent = 'Analyzing…';
      chips.innerHTML = ''; reportMeta.textContent = '';
      annotatedWrap.style.display = 'none';
      try {
        let res;
        if (pickedFile) {
          const fd = new FormData();
          fd.append('file', pickedFile);
          if (text) fd.append('text', text);
          if (username) fd.append('username', username);
          res = await fetch('/analyze', { method: 'POST', body: fd });
        } else {
          res = await fetch('/analyze', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text, username }),
          });
        }
        const rep = await res.json();
        out.textContent = JSON.stringify(rep, null, 2);
        if (rep.annotatedImage) {
          annotated.src = rep.annotatedImage;
          annotatedWrap.style.display = 'block';
        }
        chips.innerHTML = (rep.signals || [])
          .map(s => `<span class="chip">${s.type}: ${s.value}</span>`).join('') ||
          '<span class="meta">no signals detected</span>';
        const m = rep.meta || {};
        reportMeta.innerHTML =
          `processedLocally=<b class="ok">${m.processedLocally}</b> · ` +
          `stored=<b class="ok">${m.stored}</b> · ` +
          `modelsRun=[${(m.modelsRun || []).join(', ')}]`;
        statusEl.innerHTML = '<span class="ok">Done.</span>';
      } catch (err) {
        statusEl.innerHTML = '<span class="err">Request failed: ' + err + '</span>';
      }
    }
  </script>
</body>
</html>
